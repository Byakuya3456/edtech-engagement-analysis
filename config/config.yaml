# EdTech Learning Engagement Analysis Config

paths:
  raw_data: "data/raw/students.csv"
  processed_data: "data/processed/cleaned_students.csv"
  feature_data: "data/processed/features.csv"
  model_path: "models/best_model.pkl"
  pipeline_path: "models/feature_pipeline.pkl"
  reports_dir: "reports/figures/"

engagement_weights:
  logins: 0.25
  session_duration: 0.20
  module_completion: 0.20
  quiz_avg: 0.15
  forum_posts: 0.10
  video_watch: 0.10

modeling:
  train_test_split: 0.2
  random_state: 42
  smote_random_state: 42
  xgb_params:
    n_estimators: [100, 200]
    max_depth: [3, 5]
    learning_rate: [0.05, 0.1]
  kmeans_clusters: 4

mlflow:
  experiment_name: "EdTech_Engagement_Analysis"
